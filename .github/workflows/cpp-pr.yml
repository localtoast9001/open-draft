name: cpp-pr

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S cpp -B cpp/build

      - name: Build
        run: cmake --build cpp/build --config Release

      - name: Run Tests
        run: cmake --build cpp/build --config Release --target unit-tests
