name: dotnet-pr

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: net/global.json

      - name: Restore
        working-directory: net
        run: dotnet restore

      - name: Build
        working-directory: net
        run: dotnet build --no-restore

      - name: Test With Coverage
        run: ./net/test.sh --no-build

      - name: Upload .NET Test Logs And Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: net-test-logs
          path: out/logs/net/
